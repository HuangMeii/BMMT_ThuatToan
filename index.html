      <script>
        let pages = [
            "left/mod.html",
            "left/euclide.html",
            "left/generator.html",
            "left/hill.html",
            "left/aes.html",
            "left/des.html",
            "left/rsa.html"
        ];
    
        let currentIndex = 0;
        let intervalTime = 5000; // Mặc định đổi nội dung mỗi 5 giây
        let interval;
        let iframe = document.getElementById("noidung");
    
        function updateIframe() {
            iframe.classList.add("fade-out");
            setTimeout(() => {
                iframe.src = pages[currentIndex];
                currentIndex = (currentIndex + 1) % pages.length;
                iframe.classList.remove("fade-out");
                iframe.classList.add("fade-in");
            }, 800); // Chờ 0.8s trước khi thay đổi nội dung
        }
    
        function startAutoSwitching(time) {
            clearInterval(interval);
            interval = setInterval(updateIframe, time);
        }
    
        document.querySelectorAll(".m10").forEach((icon, index) => {
            icon.addEventListener("mouseenter", function () {
                clearInterval(interval);
                iframe.classList.add("fade-out");
                setTimeout(() => {
                    iframe.src = pages[index];
                    iframe.classList.remove("fade-out");
                    iframe.classList.add("fade-in");
                }, 800);
                startAutoSwitching(20000); // Khi hover, dừng 20s
            });
    
            icon.addEventListener("mouseleave", function () {
                startAutoSwitching(5000); // Sau 20s, trở lại 5s
            });
        });
    
        startAutoSwitching(intervalTime);
        function updateIframe() {
    iframe.classList.add("fade-out"); // Kích hoạt hiệu ứng mờ

    setTimeout(() => {
        iframe.src = pages[currentIndex]; // Đổi nội dung sau khi hiệu ứng mờ hoàn tất
        currentIndex = (currentIndex + 1) % pages.length;
    }, 500); // Chờ 0.5 giây trước khi thay đổi nội dung

    setTimeout(() => {
        iframe.classList.remove("fade-out");
        iframe.classList.add("fade-in"); // Hiển thị lại sau khi nội dung đã đổi
    }, 1000); // Chờ thêm để nội dung mới tải xong trước khi hiển thị
}

    </script>
